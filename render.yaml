services:
  # 1. FastAPI Python Backend Service
  - type: web
    name: instagram-account-audit-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APIFY_API_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: instagram-scraper-stable-api.p.rapidapi.com
      - key: OPENROUTER_API_KEY
        sync: false

  # 2. Frontend Static Site
  - type: web
    env: static
    name: instagram-account-audit-frontend
    staticPublishPath: ./new-ui-ux-frontend

